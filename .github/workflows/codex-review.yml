name: Codex PR Review

# Automated review of incoming pull requests by OpenAI Codex.
# Codex is the project's primary coding agent (see AGENTS.md); this brings the same
# review pass into CI so every contribution gets an independent read before merge.
#
# Gating: uses `on: pull_request` (NOT pull_request_target), so fork PRs receive no
# secret -> HAS_OPENAI_KEY is false -> every Codex step is skipped and the run stays
# green. The review only runs once OPENAI_API_KEY is present in repo secrets.

on:
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review]

permissions:
  contents: read

concurrency:
  group: codex-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    # secrets.* is not allowed in a job-level `if:`, but IS allowed in `env:`.
    env:
      HAS_OPENAI_KEY: ${{ secrets.OPENAI_API_KEY != '' }}
    outputs:
      final_message: ${{ steps.run_codex.outputs.final-message }}
    steps:
      - name: Checkout PR merge commit
        if: env.HAS_OPENAI_KEY == 'true'
        uses: actions/checkout@v5
        with:
          ref: refs/pull/${{ github.event.pull_request.number }}/merge
          persist-credentials: false
          fetch-depth: 0

      - name: Run Codex review
        id: run_codex
        if: env.HAS_OPENAI_KEY == 'true'
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          sandbox: read-only
          prompt: |
            You are reviewing pull request #${{ github.event.pull_request.number }}
            for the repository ${{ github.repository }} (Windows Care Kit — an
            open-source Windows format/reinstall toolkit in C#/.NET WPF).

            Review ONLY the changes introduced by this PR:
              git diff ${{ github.event.pull_request.base.sha }}...${{ github.event.pull_request.head.sha }}

            Focus, in priority order:
            1. Safety-model violations — destructive code must live only in
               src/Suite.Execution and pass the single SafetyGate (re-validated at
               execution time). Flag any side-door or analyzer suppression.
            2. Honesty regressions — the migration UI must never claim a transfer
               that the restore tier / honesty gate forbids; no "false green".
            3. Correctness bugs, missing tests for new behavior, and secret leakage.

            Be concise and specific, cite file:line, and if the diff looks fine say so
            briefly. End with a one-line verdict.

  post_feedback:
    runs-on: ubuntu-latest
    needs: review
    if: needs.review.outputs.final_message != ''
    permissions:
      contents: read
      issues: write
      pull-requests: write
    steps:
      - name: Post or update the Codex review comment
        uses: actions/github-script@v7
        env:
          CODEX_FINAL_MESSAGE: ${{ needs.review.outputs.final_message }}
        with:
          github-token: ${{ github.token }}
          script: |
            const marker = '<!-- codex-pr-review -->';
            // The posted body below is model output from the review job.
            const body = `${marker}\n## 🤖 Codex review\n\n${process.env.CODEX_FINAL_MESSAGE}`;
            const { owner, repo } = context.repo;
            const issue_number = context.payload.pull_request.number;
            const existing = await github.paginate(github.rest.issues.listComments, {
              owner, repo, issue_number,
            });
            const mine = existing.find(c => c.body && c.body.includes(marker));
            if (mine) {
              await github.rest.issues.updateComment({ owner, repo, comment_id: mine.id, body });
            } else {
              await github.rest.issues.createComment({ owner, repo, issue_number, body });
            }
