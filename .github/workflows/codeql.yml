# CodeQL static analysis for Windows Care Kit (WCK).
# Read-only: analyzes C# source, never runs the app or its destructive features.
name: CodeQL

# Least privilege at workflow level; the analyze job adds the one write scope
# CodeQL requires to upload results (security-events: write).
permissions:
  contents: read

on:
  push:
    branches: [main, master]
  pull_request:
    # pull_request (NOT pull_request_target) on purpose.
    branches: [main, master]
  schedule:
    # Weekly scan (Mondays 06:17 UTC) to catch advisory updates.
    - cron: '17 6 * * 1'

concurrency:
  group: codeql-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Analyze (csharp)
    runs-on: windows-latest
    permissions:
      contents: read
      security-events: write   # required: upload CodeQL results
      actions: read            # required for private repos; harmless when public
    strategy:
      fail-fast: false
      matrix:
        language: [csharp]
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup .NET (from global.json)
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4.0.1
        with:
          dotnet-version: 10.0.301
          global-json-file: global.json

      - name: Initialize CodeQL
        uses: github/codeql-action/init@4e828ff8d448a8a6e532957b1811f387a63867e8 # v3.29.4
        with:
          languages: ${{ matrix.language }}

      - name: Build
        run: dotnet build WindowsCareKit.slnx --configuration Release

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@4e828ff8d448a8a6e532957b1811f387a63867e8 # v3.29.4
        with:
          category: '/language:${{ matrix.language }}'
