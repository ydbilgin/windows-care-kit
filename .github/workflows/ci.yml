# Read-only CI for Windows Care Kit (WCK).
# Private repo (personal account). This workflow ONLY checks out, builds and tests.
# It never runs the app's destructive features (Delete/Clean/Backup/Install)
# and never opens a Sandbox/VM. Destructive/integration runs are gated
# below as a commented-out, manual + approval-protected stub.
name: CI

# Least privilege for the whole workflow. Jobs may narrow further.
permissions:
  contents: read

on:
  push:
    branches: [main, master]
  pull_request:
    # NOTE: pull_request (NOT pull_request_target) on purpose.
    # pull_request_target would run with repo write/secret context against
    # untrusted fork code and is forbidden for this repo.
    branches: [main, master]

# Avoid piling up redundant runs on rapid pushes / PR updates.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: Build and Test
    runs-on: windows-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Setup .NET (from global.json)
        uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2 # v5.3.0
        with:
          # Pinned SDK matches global.json (10.0.301).
          dotnet-version: 10.0.301
          global-json-file: global.json

      - name: Restore
        run: dotnet restore WindowsCareKit.slnx

      - name: Build
        run: dotnet build WindowsCareKit.slnx --configuration Release --no-restore

      - name: Test
        # Destructive tests (Category=Destructive) are EXCLUDED from CI by default: they touch real
        # destructive sinks and may run ONLY on a deliberately-prepared disposable machine (see
        # DisposableMachineGuard). They are handled separately by the manual/approval-gated destructive
        # job (Step 4 / the disabled stub below), never on push/PR.
        # Local full run incl. destructive (on a throwaway VM with WCK_DISPOSABLE_MACHINE=1 + marker):
        #   dotnet test tests/Suite.Tests/Suite.Tests.csproj -c Debug
        # Local default (matches CI):
        #   dotnet test tests/Suite.Tests/Suite.Tests.csproj -c Debug --filter "Category!=Destructive"
        run: dotnet test tests/Suite.Tests/Suite.Tests.csproj --configuration Release --no-build --verbosity normal --filter "Category!=Destructive" --collect:"XPlat Code Coverage" --results-directory coverage

      - name: Coverage summary
        # Measure-only: prints line/branch coverage to the log and the run summary. No threshold gate
        # (this project values non-vacuous tests over a coverage number); a regression here is informational.
        if: always()
        shell: pwsh
        run: |
          $cob = Get-ChildItem -Recurse coverage -Filter coverage.cobertura.xml -ErrorAction SilentlyContinue | Select-Object -First 1
          if (-not $cob) { Write-Host 'No coverage file produced.'; exit 0 }
          [xml]$x = Get-Content $cob.FullName
          $line = [double]$x.coverage.'line-rate'; $branch = [double]$x.coverage.'branch-rate'
          $summary = "Line {0:P1} ({1}/{2}) | Branch {3:P1} ({4}/{5})" -f `
            $line, $x.coverage.'lines-covered', $x.coverage.'lines-valid', `
            $branch, $x.coverage.'branches-covered', $x.coverage.'branches-valid'
          Write-Host "Coverage: $summary"
          "### Coverage`n$summary" >> $env:GITHUB_STEP_SUMMARY

  gitleaks:
    name: Secret Scan (gitleaks)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          # Full history so gitleaks can scan past commits.
          fetch-depth: 0

      # We run the gitleaks CLI binary directly instead of gitleaks/gitleaks-action.
      # The ACTION wrapper now phones home to validate a paid license: it calls the
      # GitHub API to decide if the repo is org-owned, and when that call is rate-
      # limited it FAILS CLOSED demanding a GITLEAKS_LICENSE secret (the cause of the
      # recurring "missing gitleaks license" CI failures). The gitleaks CLI itself is
      # MIT-licensed with no license check and no Node-20 deprecation. Pinned to an
      # exact version + SHA256 so a tampered release cannot slip in.
      - name: Install gitleaks (CLI, MIT, no license/telemetry)
        run: |
          set -euo pipefail
          VERSION=8.30.1
          SHA256=551f6fc83ea457d62a0d98237cbad105af8d557003051f41f3e7ca7b3f2470eb
          FILE="gitleaks_${VERSION}_linux_x64.tar.gz"
          curl -sSL --fail "https://github.com/gitleaks/gitleaks/releases/download/v${VERSION}/${FILE}" -o "${FILE}"
          echo "${SHA256}  ${FILE}" | sha256sum -c -
          tar -xzf "${FILE}" gitleaks
          ./gitleaks version

      - name: Run gitleaks (scan full git history)
        # `gitleaks git .` scans the repo's commit history (the non-deprecated
        # successor to `detect`; `detect` is hidden/deprecated in v8.x). Exit code 1
        # on any finding fails the job. --redact keeps secret values out of the
        # public log. Full history is available thanks to fetch-depth: 0 above.
        run: ./gitleaks git . --redact --no-banner --exit-code 1

# ---------------------------------------------------------------------------
# DESTRUCTIVE / INTEGRATION RUNS -- DISABLED STUB (DO NOT ENABLE CASUALLY)
