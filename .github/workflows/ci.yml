# Read-only CI for Windows Care Kit (WCK).
# Private repo (personal account). This workflow ONLY checks out, builds and tests.
# It never runs the app's destructive features (Delete/Clean/Backup/Install)
# and never opens a Sandbox/VM. Destructive/integration runs are gated
# below as a commented-out, manual + approval-protected stub.
name: CI

# Least privilege for the whole workflow. Jobs may narrow further.
permissions:
  contents: read

on:
  push:
    branches: [main, master]
  pull_request:
    # NOTE: pull_request (NOT pull_request_target) on purpose.
    # pull_request_target would run with repo write/secret context against
    # untrusted fork code and is forbidden for this repo.
    branches: [main, master]

# Avoid piling up redundant runs on rapid pushes / PR updates.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: Build and Test
    runs-on: windows-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup .NET (from global.json)
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4.0.1
        with:
          # Pinned SDK matches global.json (10.0.301).
          dotnet-version: 10.0.301
          global-json-file: global.json

      - name: Restore
        run: dotnet restore WindowsCareKit.slnx

      - name: Build
        run: dotnet build WindowsCareKit.slnx --configuration Release --no-restore

      - name: Test
        # Destructive tests (Category=Destructive) are EXCLUDED from CI by default: they touch real
        # destructive sinks and may run ONLY on a deliberately-prepared disposable machine (see
        # DisposableMachineGuard). They are handled separately by the manual/approval-gated destructive
        # job (Step 4 / the disabled stub below), never on push/PR.
        # Local full run incl. destructive (on a throwaway VM with WCK_DISPOSABLE_MACHINE=1 + marker):
        #   dotnet test tests/Suite.Tests/Suite.Tests.csproj -c Debug
        # Local default (matches CI):
        #   dotnet test tests/Suite.Tests/Suite.Tests.csproj -c Debug --filter "Category!=Destructive"
        run: dotnet test tests/Suite.Tests/Suite.Tests.csproj --configuration Release --no-build --verbosity normal --filter "Category!=Destructive"

  gitleaks:
    name: Secret Scan (gitleaks)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          # Full history so gitleaks can scan past commits.
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2.3.9
        env:
          # No secret is provided to fork PRs (the value is simply empty there),
          # so secret scanning still runs but the paid org feature stays off.
          # Safe-by-default: fork PRs never receive repository secrets.
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}

# ---------------------------------------------------------------------------
# DESTRUCTIVE / INTEGRATION RUNS -- DISABLED STUB (DO NOT ENABLE CASUALLY)
# ---------------------------------------------------------------------------
# The job below would exercise the app's real Delete/Clean/Backup/Install
# paths and is intentionally left commented out. If ever enabled it MUST:
#   * trigger ONLY via workflow_dispatch (manual), never on push/PR,
#   * run in a `destructive` environment that has required reviewers,
#   * execute exclusively inside a throwaway VM/Sandbox.
